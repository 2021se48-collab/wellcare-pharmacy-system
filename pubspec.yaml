name: wellcare_pharmacy
description: Professional Pharmacy Management System
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # State Management
  provider: ^6.0.5
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Encryption (Custom implementation)
  
  # PDF
  printing: ^5.14.3
  pdf: ^3.11.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_database: ^12.3.0
  encrypt: ^5.0.3
  flutter_local_notifications: ^19.5.0
  google_mobile_ads: ^5.3.1
  workmanager: ^0.7.0
  permission_handler: ^12.0.3
  excel: ^4.0.6
  mobile_scanner: ^6.0.11
  fl_chart: ^0.63.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/